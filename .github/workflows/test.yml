name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:runtime-guard
      - run: npm run test:parser
      - run: npm run test:runner
      - run: npm run test:media-replacements
      - run: npm run test:placeholder-preview
      - run: npm run test:orchestrator
      - run: npm run test:history-integrity
      - run: npm run test:history-projections
      - run: npm run test:event-sourcing-layer
